<!doctype html>
<html data-init-no-bookmark="">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sr Dev Devin</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap");
      * {
        box-sizing: border-box;
      }
      body {
        background: #0a0a0a;
        color: #e0e0e0;
        font-family: "JetBrains Mono", "Courier New", monospace;
        font-size: 15px;
        line-height: 1.7;
        max-width: 100%;
        margin: 0;
        padding: 0 0 8rem 0;
      }
      #game-container {
        max-width: 720px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .navbar-rails-3 {
        background-color: #1b1b1b;
        background-image: linear-gradient(to bottom, #222222, #111111);
        background-repeat: repeat-x;
        border-bottom: 1px solid #252525;
        padding: 0 20px;
        min-height: 40px;
        display: flex;
        align-items: center;
        box-shadow: 0 1px 10px rgba(0,0,0,0.1);
      }
      .navbar-brand {
        color: #999999;
        font-size: 20px;
        font-weight: 200;
        text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.25);
        margin-right: 20px;
        text-transform: none;
        letter-spacing: -1px;
      }
      .navbar-divider {
        color: #333;
        margin: 0 10px;
      }
      .navbar-text {
        color: #777;
        font-size: 14px;
        text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.25);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .tw-link {
        color: #7ee787;
        cursor: pointer;
        text-decoration: none;
      }
      .tw-link:hover {
        color: #a5f3b4;
      }
      /* Meta-Joke: Rails 3 Era Bootstrap Button Style */
      .tw-link.btn-rails-3 {
        display: inline-block;
        padding: 4px 12px;
        margin-top: 1rem;
        margin-bottom: 0;
        font-size: 14px;
        line-height: 20px;
        color: #ffffff;
        text-align: center;
        text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.25);
        vertical-align: middle;
        cursor: pointer;
        background-color: #006dcc;
        background-image: linear-gradient(to bottom, #0088cc, #0044cc);
        background-repeat: repeat-x;
        border: 1px solid #cccccc;
        border-color: #0044cc #0044cc #002a80;
        border-color: rgba(0, 0, 0, 0.1) rgba(0, 0, 0, 0.1) rgba(0, 0, 0, 0.25);
        border-bottom-color: #b3b3b3;
        border-radius: 4px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 1px 2px rgba(0, 0, 0, 0.05);
      }
      .tw-link.btn-rails-3:hover {
        color: #ffffff;
        background-color: #0044cc;
        background-position: 0 -15px;
        transition: background-position 0.1s linear;
        text-decoration: none;
      }
      hr {
        border: none;
        border-top: 1px solid #222;
        margin: 2rem 0;
      }
      .chapter-title {
        display: inline-block;
        padding: 2px 6px;
        font-size: 11.844px;
        font-weight: bold;
        line-height: 14px;
        color: #ffffff;
        text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.25);
        white-space: nowrap;
        vertical-align: baseline;
        background-color: #3a87ad;
        border-radius: 3px;
        text-transform: uppercase;
        margin: 1rem 0 2rem 0;
      }
    </style>
  </head>
  <body>
    <tw-storydata
      name="Sr Dev Devin"
      ifid="DEVIN-SENIOR-DEV-E001"
      format="Harlowe"
      format-version="3.3.0"
      start="intro-greg-office"
      options=""
      hidden=""
    >
      {{PASSAGES}}
    </tw-storydata>
    <script>
      (function () {
        var storyData = document.querySelector("tw-storydata");
        var passages = {};
        var startPassage = storyData.getAttribute("start");

        Array.from(storyData.querySelectorAll("tw-passagedata")).forEach(
          function (p) {
            passages[p.getAttribute("name")] = p.innerHTML;
          },
        );

        function render(text) {
          // 1. Basic Markdown-ish formatting (process BEFORE links to avoid mangling HTML tags)
          // Bold: **text**
          text = text.replace(/\*\*([^\*\n]+)\*\*/g, "<strong>$1</strong>");
          // Italics: _text_ (only single words or phrases without newlines)
          text = text.replace(/_([^_\n ]+)_/g, "<em>$1</em>");

          // Render escaped comments as chapter titles
          text = text.replace(
            /&lt;!--\s*(.*?)\s*--&gt;/g,
            '<div class="chapter-title">$1</div>',
          );

          // Hide AI notes/comments [//]:
          text = text.replace(/^\[\/\/\]:.*$/gm, "");

          // 2. Images
          text = text.replace(
            /\[img\[([^\]]+)\]\]/g,
            '<img src="$1" style="max-width:100%">',
          );

          function processLink(content) {
            var text, dest;
            // Handle |
            if (content.includes("|")) {
              var parts = content.split("|");
              text = parts[0].trim();
              dest = parts[1].trim();
            }
            // Handle -> or -&gt;
            else if (
              content.indexOf("->") !== -1 ||
              content.indexOf("-&gt;") !== -1
            ) {
              var parts = content.split(/->|-&gt;/);
              text = parts[0].trim();
              dest = parts[1].trim();
            }
            // Handle <- or &lt;-
            else if (
              content.indexOf("<-") !== -1 ||
              content.indexOf("&lt;-") !== -1
            ) {
              var parts = content.split(/<-|&lt;-/);
              text = parts[1].trim();
              dest = parts[0].trim();
            }
            // Simple link
            else {
              text = content.trim();
              dest = content.trim();
            }

            var classes = "tw-link btn-rails-3";

            return (
              '<a class="' +
              classes +
              '" data-dest="' +
              dest +
              '">' +
              text +
              "</a>"
            );
          }

          // 3. Process links: [[...]]
          text = text.replace(/\[\[+([^\]]+)\]\]+/g, function (m, content) {
            return processLink(content);
          });

          // 4. Support basic line breaks
          text = text.replace(/\n/g, "<br>");

          return text;
        }

        function go(name) {
          var html = passages[name] || "<p>Passage not found: " + name + "</p>";
          document.getElementById("game").innerHTML =
            '<div class="navbar-rails-3">' +
            '<span class="navbar-brand">Sr Dev Devin</span>' +
            '<span class="navbar-divider">/</span>' +
            '<span class="navbar-text">' +
            name.replace(/-/g, " ") +
            "</span>" +
            "</div>" +
            '<div id="game-container">' +
            render(html) +
            "</div>";
          document
            .getElementById("game")
            .querySelectorAll(".tw-link")
            .forEach(function (a) {
              a.addEventListener("click", function (e) {
                go(this.getAttribute("data-dest"));
              });
            });
        }

        document.body.innerHTML = '<div id="game"></div>';
        go(startPassage);
      })();
    </script>
  </body>
</html>
