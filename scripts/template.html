<!doctype html>
<html data-init-no-bookmark="">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sr Dev Devin</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap");
      * {
        box-sizing: border-box;
      }
      body {
        background: #0a0a0a;
        color: #e0e0e0;
        font-family: "JetBrains Mono", "Courier New", monospace;
        font-size: 15px;
        line-height: 1.7;
        max-width: 100%;
        margin: 0;
        padding: 0 0 8rem 0;
      }
      #game-container {
        max-width: 720px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .navbar-rails-3 {
        background-color: #1b1b1b;
        background-image: linear-gradient(to bottom, #222222, #111111);
        background-repeat: repeat-x;
        border-bottom: 1px solid #252525;
        padding: 0 20px;
        min-height: 40px;
        display: flex;
        align-items: center;
        box-shadow: 0 1px 10px rgba(0,0,0,0.1);
      }
      .navbar-brand {
        color: #999999;
        font-size: 20px;
        font-weight: 200;
        text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.25);
        margin-right: 20px;
        text-transform: none;
        letter-spacing: -1px;
      }
      .navbar-divider {
        color: #333;
        margin: 0 10px;
      }
      .navbar-text {
        color: #777;
        font-size: 14px;
        text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.25);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .tw-link {
        color: #7ee787;
        cursor: pointer;
        text-decoration: none;
      }
      .tw-link:hover {
        color: #a5f3b4;
      }
      .tw-link.lore-link {
        color: #0088cc;
        font-size: 1.25em;
        font-weight: 600;
        text-decoration: underline;
        text-underline-offset: 4px;
      }
      .tw-link.lore-link:hover {
        color: #005580;
      }
      /* Meta-Joke: Rails 3 Era Bootstrap Button Style */
      .tw-link.btn-rails-3 {
        display: block;
        width: 100%;
        padding: 10px 12px;
        margin-top: 4px;
        margin-bottom: 4px;
        font-size: 14px;
        line-height: 20px;
        color: #ffffff;
        text-align: center;
        text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.25);
        vertical-align: middle;
        cursor: pointer;
        background-color: #006dcc;
        background-image: linear-gradient(to bottom, #0088cc, #0044cc);
        background-repeat: repeat-x;
        border: 1px solid #cccccc;
        border-color: #0044cc #0044cc #002a80;
        border-color: rgba(0, 0, 0, 0.1) rgba(0, 0, 0, 0.1) rgba(0, 0, 0, 0.25);
        border-bottom-color: #b3b3b3;
        border-radius: 4px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 1px 2px rgba(0, 0, 0, 0.05);
      }
      .tw-link.btn-rails-3:hover {
        color: #ffffff;
        background-color: #0044cc;
        background-position: 0 -15px;
        transition: background-position 0.1s linear;
        text-decoration: none;
      }
      hr {
        border: none;
        border-top: 1px solid #222;
        margin: 2rem 0;
      }
      .chapter-title {
        display: inline-block;
        padding: 8px 16px;
        margin-top: 1rem;
        margin-bottom: 2rem;
        background-color: #3a87ad;
        border-radius: 3px;
        font-size: 11.844px;
        line-height: 14px;
        color: #ffffff;
      }
      /* Stress Meter Styling */
      .stress-container {
        display: flex;
        align-items: center;
        margin-left: auto;
        gap: 10px;
      }
      .stress-label {
        font-size: 12px;
        color: #777;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .stress-bar-bg {
        width: 100px;
        height: 12px;
        background: #222;
        border: 1px solid #333;
        border-radius: 2px;
        overflow: hidden;
      }
      .stress-bar-fill {
        height: 100%;
        background: linear-gradient(to right, #7ee787, #f85149);
        width: 0%;
        transition: width 0.5s ease;
      }
      /* Rails 3.2 Bootstrap Alert Style for Game Over */
      .alert-rails-3 {
        padding: 14px 35px 14px 14px;
        margin-top: 2rem;
        margin-bottom: 20px;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
        background-color: #f2dede;
        border: 1px solid #eed3d7;
        border-radius: 4px;
        color: #b94a48;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }
      .alert-rails-3 h4 {
        margin: 0 0 10px 0;
        line-height: 20px;
        color: inherit;
        font-weight: bold;
        font-size: 17.5px;
        text-transform: uppercase;
      }

      /* Rails 3.2 Bootstrap Modal Style */
      .modal-backdrop {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 1040;
        background-color: #000000;
        opacity: 0.8;
        display: none;
      }
      .modal {
        position: fixed;
        top: 10%;
        left: 50%;
        z-index: 1050;
        width: 560px;
        margin-left: -280px;
        background-color: #1b1b1b;
        border: 1px solid #333;
        border-radius: 6px;
        outline: none;
        box-shadow: 0 3px 7px rgba(0, 0, 0, 0.3);
        display: none;
        flex-direction: column;
      }
      .modal-header {
        padding: 9px 15px;
        border-bottom: 1px solid #333;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .modal-header h3 {
        margin: 0;
        line-height: 30px;
        font-size: 24.5px;
        color: #e0e0e0;
      }
      .close {
        float: right;
        font-size: 20px;
        font-weight: bold;
        line-height: 20px;
        color: #999;
        text-shadow: 0 1px 0 #000;
        opacity: 0.4;
        cursor: pointer;
        background: none;
        border: 0;
      }
      .close:hover {
        color: #ffffff;
        opacity: 1;
      }
      .modal-body {
        position: relative;
        max-height: 400px;
        padding: 15px;
        overflow-y: auto;
      }
      .modal-footer {
        padding: 14px 15px 15px;
        margin-bottom: 0;
        text-align: right;
        background-color: #222;
        border-top: 1px solid #333;
        border-radius: 0 0 6px 6px;
        box-shadow: inset 0 1px 0 #333;
      }
    </style>
  </head>
  <body>
    <tw-storydata
      name="Sr Dev Devin"
      ifid="DEVIN-SENIOR-DEV-E001"
      format="Harlowe"
      format-version="3.3.0"
      start="intro-greg-office"
      options=""
      hidden=""
    >
      {{PASSAGES}}
    </tw-storydata>
    <script>
      (function () {
        var storyData = document.querySelector("tw-storydata");
        var passages = {};
        var passageTags = {};
        var startPassage = storyData.getAttribute("start");

        // Persistent State
        var initialState = {{INITIAL_STATE}};
        var state = Object.assign({
          unlockedLore: [],
          lastStoryPassage: startPassage
        }, initialState);

        // Load state from localStorage
        var savedState = localStorage.getItem("sr-dev-devin-state");
        if (savedState) {
          try {
            var loaded = JSON.parse(savedState);
            state = Object.assign(state, loaded);
          } catch (e) {
            console.error("Failed to parse saved state", e);
          }
        }

        function saveState() {
          localStorage.setItem("sr-dev-devin-state", JSON.stringify(state));
        }

        window.closeModal = function() {
          document.getElementById('lore-modal').style.display = 'none';
          document.getElementById('modal-backdrop').style.display = 'none';
        };

        window.openLoreModal = function(name) {
          // Unlock lore if it's a specific entry
          if (name.startsWith("lore-") && state.unlockedLore.indexOf(name) === -1) {
            state.unlockedLore.push(name);
            saveState();
          }

          var html = passages[name] || "<p>Lore not found: " + name + "</p>";
          
          // Custom handling for lore index
          if (name === "lore-index") {
            html = ":: lore-index\n**LOREBOOK**\n\nExplore discovered records:\n\n";
            state.unlockedLore.forEach(function(loreName) {
              var cleanName = loreName.replace("lore-", "").replace(/-/g, " ");
              html += "[[ " + cleanName.toUpperCase() + " | " + loreName + " ]]\n";
            });
          }

          var title = name.replace("lore-", "").replace(/-/g, " ");
          if (name === "lore-index") title = "Lorebook";
          document.getElementById('modal-title').innerText = title.toUpperCase();
          document.getElementById('modal-body').innerHTML = render(html);
          
          // Re-bind links inside modal
          document.getElementById('modal-body').querySelectorAll(".tw-link").forEach(function (a) {
            a.addEventListener("click", function (e) {
              var dest = this.getAttribute("data-dest");
              if (dest.startsWith("lore-") || dest === "lore-index") {
                openLoreModal(dest);
              } else {
                closeModal();
                go(dest);
              }
            });
          });

          document.getElementById('lore-modal').style.display = 'flex';
          document.getElementById('modal-backdrop').style.display = 'block';
        };

        window.resetStory = function() {
          var state = JSON.parse(localStorage.getItem("sr-dev-devin-state") || "{}");
          delete state.lastStoryPassage;
          localStorage.setItem("sr-dev-devin-state", JSON.stringify(state));
          location.reload();
        };

        Array.from(storyData.querySelectorAll("tw-passagedata")).forEach(
          function (p) {
            var name = p.getAttribute("name");
            passages[name] = p.innerHTML;
            passageTags[name] = (p.getAttribute("tags") || "").split(" ").filter(t => t.trim() !== "");
          },
        );

        function render(text) {
          // 0. Game Over Block (Rails 3.2 style)
          // Look for **GAME OVER: TITLE** followed by *description*
          text = text.replace(
            /\*\*GAME OVER:\s*([^\n\*]+)\*\*\s*[\r\n]+\*([^\*]+)\*/g,
            '<div class="alert-rails-3"><h4>GAME OVER: $1</h4>$2</div>'
          );

          // 1. Basic Markdown-ish formatting (process BEFORE links to avoid mangling HTML tags)
          // Bold: **text**
          text = text.replace(/\*\*([^\*\n]+)\*\*/g, "<strong>$1</strong>");
          // Italics: _text_ (only single words or phrases without newlines)
          text = text.replace(/_([^_\n ]+)_/g, "<em>$1</em>");

          // Render escaped comments as chapter titles, but hide IMAGE PROMPTS
          text = text.replace(
            /&lt;!--\s*([\s\S]*?)\s*--&gt;/g,
            function(match, p1) {
              if (p1.toUpperCase().indexOf("IMAGE PROMPT") !== -1) return "";
              return '<div class="chapter-title">' + p1 + '</div>';
            }
          );

          // Hide AI notes/comments [//]:
          text = text.replace(/^\[\/\/\]:.*$/gm, "");

          // 1.5. Conditional Lore Rendering
          // Syntax: {{if lore-id}} ... {{endif}}
          text = text.replace(/\{\{if ([^}]+)\}\}([\s\S]*?)\{\{endif\}\}/g, function(match, condition, content) {
            if (state.unlockedLore.indexOf(condition.trim()) !== -1) {
              return content;
            }
            return "";
          });

          // 2. Images
          text = text.replace(
            /\[img\[([^\]]+)\]\]/g,
            '<img src="$1" style="max-width:100%">',
          );

          function processLink(content, setter) {
            var text, dest;
            // Handle |
            if (content.includes("|")) {
              var parts = content.split("|");
              text = parts[0].trim();
              dest = parts[1].trim();
            }
            // Handle -> or -&gt;
            else if (
              content.indexOf("->") !== -1 ||
              content.indexOf("-&gt;") !== -1
            ) {
              var parts = content.split(/->|-&gt;/);
              text = parts[0].trim();
              dest = parts[1].trim();
            }
            // Handle <- or &lt;-
            else if (
              content.indexOf("<-") !== -1 ||
              content.indexOf("&lt;-") !== -1
            ) {
              var parts = content.split(/<-|&lt;-/);
              text = parts[1].trim();
              dest = parts[0].trim();
            }
            // Simple link
            else {
              text = content.trim();
              dest = content.trim();
            }

            var isLore = dest.startsWith("lore-") || dest === "lore-index";
            var classes = "tw-link";
            if (isLore) {
              classes += " lore-link";
            } else {
              classes += " btn-rails-3";
            }

            var setterAttr = setter ? ' data-setter="' + setter.replace(/"/g, '&quot;') + '"' : "";

            return (
              '<a class="' +
              classes +
              '" data-dest="' +
              dest +
              '"' + setterAttr + '>' +
              text +
              "</a>"
            );
          }

          // 3. Process links: [[...]] {setter}
          text = text.replace(/\[\[+([^\]\]]+)\]\]+(?:\{([^\}]+)\})?/g, function (m, content, setter) {
            return processLink(content, setter);
          });

          // 4. Support basic line breaks
          text = text.replace(/\n/g, "<br>");

          return text;
        }

        function go(name) {
          // Logic for unlocking lore via naming convention
          if (name.startsWith("lore-") && state.unlockedLore.indexOf(name) === -1) {
            state.unlockedLore.push(name);
            saveState();
          }

          // Logic for unlocking lore via passage tags
          if (passageTags[name]) {
            passageTags[name].forEach(function(tag) {
              if (tag.startsWith("unlock-lore-")) {
                var loreId = tag.replace("unlock-lore-", "lore-");
                if (state.unlockedLore.indexOf(loreId) === -1) {
                  state.unlockedLore.push(loreId);
                  saveState();
                }
              }
            });
          }

          // Track the last non-lore passage so "Return" links work
          if (!name.startsWith("lore-") && name !== "lore-index") {
            state.lastStoryPassage = name;
            saveState();
          }

          var html = passages[name] || "<p>Passage not found: " + name + "</p>";
          
          // Custom handling for lore index
          if (name === "lore-index") {
            html = ":: lore-index\n**LOREBOOK**\n\nExplore discovered records:\n\n";
            state.unlockedLore.forEach(function(loreName) {
              var cleanName = loreName.replace("lore-", "").replace(/-/g, " ");
              html += "[[ " + cleanName.toUpperCase() + " | " + loreName + " ]]\n";
            });
            html += "\n[[ Return to Story | " + state.lastStoryPassage + " ]]";
          }

          var loreLinkHtml = "";
          if (state.unlockedLore.length > 0) {
            loreLinkHtml = '<span class="navbar-divider">|</span>' +
                           '<a class="tw-link" style="font-size: 14px; text-transform: uppercase;" data-dest="lore-index">Lore</a>';
          }

          var stressPercent = Math.min(100, Math.max(0, state.devin.stress || 0));
          var stressHtml = '<div class="stress-container">' +
                           '<span class="stress-label">Stress</span>' +
                           '<div class="stress-bar-bg"><div class="stress-bar-fill" style="width: ' + stressPercent + '%"></div></div>' +
                           '</div>';

          var isDev = window.location.search.indexOf("dev=1") !== -1;
          var breadcrumbHtml = "";
          if (isDev) {
            breadcrumbHtml = '<span class="navbar-divider">/</span>' +
                             '<span class="navbar-text">' +
                             name.replace(/-/g, " ") +
                             "</span>";
          }

          document.getElementById("game").innerHTML =
            '<div class="navbar-rails-3">' +
            '<a href="#" onclick="resetStory(); return false;" class="navbar-brand" style="text-decoration:none;">Sr Dev Devin</a>' +
            breadcrumbHtml +
            loreLinkHtml +
            stressHtml +
            "</div>" +
            '<div id="game-container">' +
            render(html) +
            "</div>";

          document
            .getElementById("game")
            .querySelectorAll(".tw-link")
            .forEach(function (a) {
              a.addEventListener("click", function (e) {
                var dest = this.getAttribute("data-dest");
                var setter = this.getAttribute("data-setter");
                
                if (setter) {
                  try {
                    // Simple parser for "stress += 10" or "stress = 50"
                    // Maps "stress" to "state.devin.stress"
                    var code = setter.replace(/([a-zA-Z0-9_]+)\s*(\+|-)?=/g, "state.devin.$1 $2=");
                    eval(code);
                    saveState();
                  } catch(err) {
                    console.error("Failed to execute setter:", setter, err);
                  }
                }

                if (dest.startsWith("lore-") || dest === "lore-index") {
                  openLoreModal(dest);
                } else {
                  go(dest);
                }
              });
            });
        }

        document.body.innerHTML = 
          '<div id="modal-backdrop" class="modal-backdrop" onclick="closeModal()"></div>' +
          '<div id="lore-modal" class="modal">' +
            '<div class="modal-header">' +
              '<h3 id="modal-title">Lore</h3>' +
              '<button class="close" onclick="closeModal()">&times;</button>' +
            '</div>' +
            '<div class="modal-body" id="modal-body"></div>' +
            '<div class="modal-footer">' +
              '<button class="btn-rails-3" style="margin-top:0" onclick="closeModal()">Close</button>' +
            '</div>' +
          '</div>' +
          '<div id="game"></div>';
        go(state.lastStoryPassage || startPassage);
      })();
    </script>
  </body>
</html>
